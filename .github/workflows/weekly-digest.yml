name: Weekly Vedic Digest

on:
  schedule:
    - cron: '0 13 * * 0'  # Every Sunday morning Eastern
  workflow_dispatch:        # Manual trigger via GitHub UI

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  SLACK_MEMBER_ID: ${{ secrets.SLACK_MEMBER_ID }}
  SLACK_MENTION: ${{ secrets.SLACK_MENTION }}
  DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
  VEDIC_CONFIG_YAML: ${{ secrets.VEDIC_CONFIG_YAML }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push shloka_history.json memory back to repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-core.txt

      - name: Generate weekly guidance + write memory
        run: python scripts/weekly_guidance.py --write-history

      - name: Commit shloka history (memory)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/shloka_history.json
          git diff --cached --quiet && echo "No history changes" || \
            git commit -m "chore: update shloka history [skip ci]" && git push

      - name: Send to Slack
        run: python scripts/slack_notify.py

  deploy-dashboard:
    if: ${{ vars.ENABLE_GITHUB_PAGES == 'true' }}
    runs-on: ubuntu-latest
    needs: notify
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (with updated history from notify)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-core.txt

      - name: Regenerate current_week.json for Pages (no memory write)
        run: python scripts/weekly_guidance.py --no-write-history

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard artifact (includes current_week.json)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
